name: tasklist
version: 1.1.0
description: "TaskList auto-sort: immediately inherit parent TaskList membership after kanban_create, then reconcile lifecycle misses deterministically; parentless tasks use the active model only when claimed. Pairs with the TaskList dashboard plugin in dashboard/."
author: Louis Klimek
# Hermes observer hooks this plugin uses (also registered in register()).
hooks:
  - post_tool_call
  - kanban_task_claimed
  - kanban_task_completed
